<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AkhandEdit — Pro Image Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0e11;
    --panel: #161820;
    --panel2: #1e2028;
    --border: #2a2d38;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --text: #e8eaf0;
    --text2: #8890aa;
    --text3: #555a6e;
    --green: #06d6a0;
    --blue: #4cc9f0;
    --red: #ef233c;
    --purple: #b5179e;
    --radius: 8px;
    --tool-size: 42px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; font-weight: 500; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

  /* ── TOP BAR ── */
  #topbar {
    height: 48px; min-height: 48px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    z-index: 100; flex-shrink: 0;
  }
  .brand { font-size: 18px; font-weight: 700; letter-spacing: 1px; color: var(--accent); white-space: nowrap; margin-right: 8px; }
  .brand span { color: var(--accent2); }
  .top-btn {
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: var(--radius); font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: all .15s; display: flex; align-items: center; gap: 5px;
  }
  .top-btn:hover { border-color: var(--accent); color: var(--accent); }
  .top-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .top-btn.primary:hover { background: #ff8455; }
  .spacer { flex: 1; }
  .zoom-display { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text2); padding: 0 8px; }

  /* ── MAIN LAYOUT ── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── LEFT TOOLBAR ── */
  #toolbar {
    width: 52px; min-width: 52px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 3px;
    overflow-y: auto; z-index: 50; flex-shrink: 0;
  }
  .tool-btn {
    width: var(--tool-size); height: var(--tool-size);
    background: transparent; border: 1px solid transparent;
    border-radius: var(--radius); cursor: pointer; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all .15s; position: relative; flex-shrink: 0;
  }
  .tool-btn:hover { background: var(--panel2); color: var(--text); border-color: var(--border); }
  .tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tool-sep { width: 30px; height: 1px; background: var(--border); margin: 4px 0; flex-shrink: 0; }

  /* ── CANVAS AREA ── */
  #canvas-wrap {
    flex: 1; background: #0a0b0d; overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  #canvas-container {
    position: relative; transform-origin: center center;
    box-shadow: 0 0 0 1px #333, 0 20px 60px rgba(0,0,0,.8);
  }
  #main-canvas { display: block; cursor: crosshair; }
  #overlay-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }

  /* ── RIGHT PANEL ── */
  #right-panel {
    width: 240px; min-width: 240px; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; z-index: 50; flex-shrink: 0;
  }
  .panel-section { border-bottom: 1px solid var(--border); padding: 12px; }
  .panel-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Sliders */
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .slider-label { font-size: 12px; color: var(--text2); width: 68px; flex-shrink: 0; }
  .slider-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent2); width: 32px; text-align: right; flex-shrink: 0; }
  input[type=range] {
    flex: 1; -webkit-appearance: none; height: 4px; background: var(--border); border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--bg);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--bg);
  }

  /* Color pickers */
  .color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .color-label { font-size: 12px; color: var(--text2); width: 68px; }
  
  /* Buttons */
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-sm {
    flex: 1; min-width: 60px; background: var(--panel2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 8px; border-radius: 6px; font-family: 'Rajdhani', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all .15s;
    white-space: nowrap;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-sm.accent:hover { background: #ff8455; }

  /* Filters */
  .filter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .filter-btn {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 4px; font-size: 11px; font-weight: 600; cursor: pointer; color: var(--text2);
    text-align: center; transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Drag-drop overlay */
  #drop-overlay {
    position: absolute; inset: 0; background: rgba(255,107,53,.12);
    border: 3px dashed var(--accent); display: none; align-items: center; justify-content: center;
    z-index: 200; pointer-events: none; border-radius: 12px;
    font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 2px;
  }
  #drop-overlay.show { display: flex; }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
    z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-toggle { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
  .section-toggle::before { content: '▾'; color: var(--text3); font-size: 10px; transition: transform .2s; }
  .section-toggle.collapsed::before { transform: rotate(-90deg); }
  .section-body { overflow: hidden; }
  .section-body.hidden { display: none; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="brand">Akhand<span>Edit</span></div>
  <button class="top-btn" onclick="document.getElementById('file-input').click()">📂 Open</button>
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <button class="top-btn" onclick="newCanvas(800, 600)">✨ New</button>
  <button class="top-btn" onclick="undo()">↩ Undo</button>
  <button class="top-btn" onclick="redo()">↪ Redo</button>
  <div class="spacer"></div>
  <div class="zoom-display" id="zoom-label">100%</div>
  <button class="top-btn" onclick="zoomIn()">＋</button>
  <button class="top-btn" onclick="zoomOut()">－</button>
  <button class="top-btn" onclick="fitToScreen()">⊡</button>
  <button class="top-btn primary" onclick="exportImage()">💾 Export</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT TOOLBAR -->
  <div id="toolbar">
    <button class="tool-btn active" id="tb-select" onclick="setTool('select')" title="Select / Move (V)"><span>↖</span></button>
    <button class="tool-btn" id="tb-crop" onclick="setTool('crop')" title="Crop (C)"><span>✂</span></button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tb-brush" onclick="setTool('brush')" title="Brush (B)"><span>🖌</span></button>
    <button class="tool-btn" id="tb-eraser" onclick="setTool('eraser')" title="Eraser (E)"><span>◻</span></button>
    <button class="tool-btn" id="tb-fill" onclick="setTool('fill')" title="Fill / Paint Bucket (G)"><span>🪣</span></button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tb-shape" onclick="setTool('shape')" title="Shapes (S)"><span>▭</span></button>
    <button class="tool-btn" id="tb-line" onclick="setTool('line')" title="Line / Arrow (L)"><span>╱</span></button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tb-eyedropper" onclick="setTool('eyedropper')" title="Eyedropper (I)"><span>💉</span></button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="rotateRight()" title="Rotate Right 90°"><span>↻</span></button>
  </div>

  <!-- CANVAS AREA -->
  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="main-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
    </div>
    <div id="drop-overlay">DROP IMAGE HERE</div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">

    <!-- ADJUSTMENTS -->
    <div class="panel-section">
      <div class="panel-title section-toggle" onclick="toggleSection(this)">Adjustments</div>
      <div class="section-body">
        <div class="slider-row"><span class="slider-label">Brightness</span><input type="range" id="sl-brightness" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-brightness">0</span></div>
        <div class="slider-row"><span class="slider-label">Contrast</span><input type="range" id="sl-contrast" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-contrast">0</span></div>
        <div class="slider-row"><span class="slider-label">Saturation</span><input type="range" id="sl-saturation" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-saturation">0</span></div>
        <div class="btn-row" style="margin-top:6px">
          <button class="btn-sm" onclick="resetAdjustments()">Reset</button>
          <button class="btn-sm accent" onclick="bakeAdjustments()">Apply</button>
        </div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="panel-section">
      <div class="panel-title section-toggle" onclick="toggleSection(this)">Filters</div>
      <div class="section-body">
        <div class="filter-grid" id="filter-grid"></div>
      </div>
    </div>

    <!-- BRUSH / TOOL OPTIONS -->
    <div class="panel-section">
      <div class="panel-title section-toggle" onclick="toggleSection(this)">Brush / Tool</div>
      <div class="section-body">
        <div class="slider-row">
          <span class="slider-label">Size</span>
          <input type="range" min="1" max="100" value="10" oninput="config.brushSize = parseInt(this.value)">
        </div>
        <div class="color-row">
          <span class="color-label">Color</span>
          <input type="color" id="brush-color-picker" value="#ff6b35" onchange="config.brushColor = this.value" style="display:none;">
          <button class="btn-sm" onclick="document.getElementById('brush-color-picker').click()">Pick Color</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- JAVASCRIPT LOGIC ENGINE -->
<script>
  // ── STATE MANAGEMENT ──
  let canvas = document.getElementById('main-canvas');
  let ctx = canvas.getContext('2d', { willReadFrequently: true });
  let overlayCanvas = document.getElementById('overlay-canvas');
  let oCtx = overlayCanvas.getContext('2d');
  let container = document.getElementById('canvas-container');
  let zoomLabel = document.getElementById('zoom-label');

  let currentTool = 'select';
  let isDrawing = false;
  let zoom = 1;
  let startX, startY;
  
  let baseImage = null; 
  let historyStack = [];
  let redoStack = [];
  const maxHistory = 20;

  let config = {
    brushSize: 10,
    brushColor: '#ff6b35',
    brushOpacity: 1
  };

  // ── INITIALIZATION ──
  window.addEventListener('DOMContentLoaded', () => {
    initFilters();
    newCanvas(800, 600);
    setupEventListeners();
  });

  function newCanvas(w = 800, h = 600) {
    canvas.width = w;
    canvas.height = h;
    overlayCanvas.width = w;
    overlayCanvas.height = h;
    
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    
    baseImage = null;
    resetAdjustments();
    saveHistory();
    fitToScreen();
  }

  // ── FILE HANDLING ──
  document.getElementById('file-input').addEventListener('change', function(e) {
    if (e.target.files && e.target.files[0]) {
      loadImage(e.target.files[0]);
    }
  });

  function loadImage(file) {
    let reader = new FileReader();
    reader.onload = function(event) {
      let img = new Image();
      img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        overlayCanvas.width = img.width;
        overlayCanvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        baseImage = img;
        resetAdjustments();
        saveHistory();
        fitToScreen();
        showToast("Loaded image successfully!");
      }
      img.src = event.target.result;
    }
    reader.readAsDataURL(file);
  }

  // ── TOOL SELECTION ──
  function setTool(toolName) {
    currentTool = toolName;
    document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
    let activeBtn = document.getElementById(`tb-${toolName}`);
    if (activeBtn) activeBtn.classList.add('active');
  }

  // ── MOUSE/TOUCH DRAWING SYSTEM ──
  function setupEventListeners() {
    canvas.addEventListener('mousedown', startAction);
    canvas.addEventListener('mousemove', doAction);
    window.addEventListener('mouseup', endAction);

    // Keyboard Shortcuts
    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      let key = e.key.toLowerCase();
      if (key === 'v') setTool('select');
      if (key === 'c') setTool('crop');
      if (key === 'b') setTool('brush');
      if (key === 'e') setTool('eraser');
      if (key === 'g') setTool('fill');
      if (key === 's') setTool('shape');
      if (key === 'l') setTool('line');
      if (key === 'i') setTool('eyedropper');
      if (e.ctrlKey && key === 'z') { e.preventDefault(); undo(); }
      if (e.ctrlKey && key === 'y') { e.preventDefault(); redo(); }
    });

    // Drag and Drop
    let dragWrap = document.getElementById('canvas-wrap');
    let dropOverlay = document.getElementById('drop-overlay');
    dragWrap.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.classList.add('show'); });
    dragWrap.addEventListener('dragleave', () => dropOverlay.classList.remove('show'));
    dragWrap.addEventListener('drop', (e) => {
      e.preventDefault();
      dropOverlay.classList.remove('show');
      if (e.dataTransfer.files.length > 0) loadImage(e.dataTransfer.files[0]);
    });
  }

  function getCanvasCoords(e) {
    let rect = canvas.getBoundingClientRect();
    return {
      x: Math.round((e.clientX - rect.left) / zoom),
      y: Math.round((e.clientY - rect.top) / zoom)
    };
  }

  function startAction(e) {
    isDrawing = true;
    let coords = getCanvasCoords(e);
    startX = coords.x;
    startY = coords.y;

    if (currentTool === 'brush' || currentTool === 'eraser') {
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineWidth = config.brushSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = currentTool === 'eraser' ? '#FFFFFF' : config.brushColor;
      ctx.globalAlpha = config.brushOpacity;
    } else if (currentTool === 'eyedropper') {
      let pixel = ctx.getImageData(startX, startY, 1, 1).data;
      let hex = "#" + ("000000" + ((pixel[0] << 16) | (pixel[1] << 8) | pixel[2]).toString(16)).slice(-6);
      config.brushColor = hex;
      document.getElementById('brush-color-picker').value = hex;
      showToast(`Color Picked: ${hex}`);
      setTool('brush');
    } else if (currentTool === 'fill') {
      floodFill(startX, startY, hexToRgb(config.brushColor));
      saveHistory();
    }
  }

  function doAction(e) {
    if (!isDrawing) return;
    let coords = getCanvasCoords(e);
    let currentX = coords.x;
    let currentY = coords.y;

    if (currentTool === 'brush' || currentTool === 'eraser') {
      ctx.lineTo(currentX, currentY);
      ctx.stroke();
    } else if (['shape', 'line', 'crop'].includes(currentTool)) {
      oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      oCtx.strokeStyle = config.brushColor;
      oCtx.lineWidth = config.brushSize;
      
      if (currentTool === 'line') {
        oCtx.beginPath(); oCtx.moveTo(startX, startY); oCtx.lineTo(currentX, currentY); oCtx.stroke();
      } else if (currentTool === 'shape') {
        oCtx.strokeRect(startX, startY, currentX - startX, currentY - startY);
      } else if (currentTool === 'crop') {
        oCtx.strokeStyle = '#ff6b35'; oCtx.lineWidth = 2;
        oCtx.setLineDash([6, 4]);
        oCtx.strokeRect(startX, startY, currentX - startX, currentY - startY);
        oCtx.setLineDash([]);
      }
    }
  }

  function endAction(e) {
    if (!isDrawing) return;
    isDrawing = false;
    oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    let coords = getCanvasCoords(e);

    ctx.globalAlpha = 1.0;
    ctx.strokeStyle = config.brushColor;
    ctx.lineWidth = config.brushSize;

    if (currentTool === 'line') {
      ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(coords.x, coords.y); ctx.stroke();
      saveHistory();
    } else if (currentTool === 'shape') {
      ctx.strokeRect(startX, startY, coords.x - startX, coords.y - startY);
      saveHistory();
    } else if (currentTool === 'crop') {
      let w = Math.abs(coords.x - startX);
      let h = Math.abs(coords.y - startY);
      if (w > 5 && h > 5) {
      let cropX = Math.min(startX, coords.x);
        let cropY = Math.min(startY, coords.y);
        let cutData = ctx.getImageData(cropX, cropY, w, h);
        canvas.width = w; canvas.height = h;
        overlayCanvas.width = w; overlayCanvas.height = h;
        ctx.putImageData(cutData, 0, 0);
        baseImage = null;
        fitToScreen();
        saveHistory();
      }
    } else if (currentTool === 'brush' || currentTool === 'eraser') {
      saveHistory();
    }
  }

  // ── REALTIME CSS FILTER ADJUSTMENTS ──
  function applyAdjustments() {
    let b = parseInt(document.getElementById('sl-brightness').value);
    let c = parseInt(document.getElementById('sl-contrast').value);
    let s = parseInt(document.getElementById('sl-saturation').value);
    
    document.getElementById('v-brightness').innerText = b;
    document.getElementById('v-contrast').innerText = c;
    document.getElementById('v-saturation').innerText = s;

    canvas.style.filter = `brightness(${100 + b}%) contrast(${100 + c}%) saturate(${100 + s}%)`;
  }

  function bakeAdjustments() {
    ctx.save();
    ctx.filter = canvas.style.filter;
    ctx.drawImage(canvas, 0, 0);
    ctx.restore();
    
    canvas.s
