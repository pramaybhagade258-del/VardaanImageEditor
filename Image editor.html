<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AkhandEdit — Pro Image Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0e11;
    --panel: #161820;
    --panel2: #1e2028;
    --border: #2a2d38;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --text: #e8eaf0;
    --text2: #8890aa;
    --text3: #555a6e;
    --green: #06d6a0;
    --blue: #4cc9f0;
    --red: #ef233c;
    --purple: #b5179e;
    --radius: 8px;
    --tool-size: 42px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; font-weight: 500; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

  /* ── TOP BAR ── */
  #topbar {
    height: 48px; min-height: 48px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    z-index: 100; flex-shrink: 0;
  }
  .brand { font-size: 18px; font-weight: 700; letter-spacing: 1px; color: var(--accent); white-space: nowrap; margin-right: 8px; }
  .brand span { color: var(--accent2); }
  .top-btn {
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: var(--radius); font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: all .15s; display: flex; align-items: center; gap: 5px;
  }
  .top-btn:hover { border-color: var(--accent); color: var(--accent); }
  .top-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .top-btn.primary:hover { background: #ff8455; }
  .spacer { flex: 1; }
  .zoom-display { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text2); padding: 0 8px; }

  /* ── MAIN LAYOUT ── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── LEFT TOOLBAR ── */
  #toolbar {
    width: 52px; min-width: 52px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 3px;
    overflow-y: auto; z-index: 50; flex-shrink: 0;
  }
  .tool-btn {
    width: var(--tool-size); height: var(--tool-size);
    background: transparent; border: 1px solid transparent;
    border-radius: var(--radius); cursor: pointer; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all .15s; position: relative; flex-shrink: 0;
  }
  .tool-btn:hover { background: var(--panel2); color: var(--text); border-color: var(--border); }
  .tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tool-sep { width: 30px; height: 1px; background: var(--border); margin: 4px 0; flex-shrink: 0; }
  .tool-label { font-size: 8px; font-weight: 600; letter-spacing: .5px; margin-top: 2px; display: block; }

  /* ── CANVAS AREA ── */
  #canvas-wrap {
    flex: 1; background: #0a0b0d; overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  #canvas-container {
    position: relative; transform-origin: center center;
    box-shadow: 0 0 0 1px #333, 0 20px 60px rgba(0,0,0,.8);
  }
  #main-canvas { display: block; cursor: crosshair; }
  #overlay-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }

  /* ── RIGHT PANEL ── */
  #right-panel {
    width: 240px; min-width: 240px; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; z-index: 50; flex-shrink: 0;
  }
  .panel-section { border-bottom: 1px solid var(--border); padding: 12px; }
  .panel-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Sliders */
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .slider-label { font-size: 12px; color: var(--text2); width: 68px; flex-shrink: 0; }
  .slider-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent2); width: 32px; text-align: right; flex-shrink: 0; }
  input[type=range] {
    flex: 1; -webkit-appearance: none; height: 4px; background: var(--border); border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--bg);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--bg);
  }

  /* Color pickers */
  .color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .color-label { font-size: 12px; color: var(--text2); width: 68px; }
  .color-swatch {
    width: 28px; height: 28px; border-radius: 6px; border: 2px solid var(--border);
    cursor: pointer; transition: border-color .15s; flex-shrink: 0;
  }
  .color-swatch:hover { border-color: var(--accent); }
  input[type=color] { opacity: 0; position: absolute; width: 0; height: 0; }
  .hex-input {
    flex: 1; background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    outline: none;
  }
  .hex-input:focus { border-color: var(--accent); }

  /* Buttons */
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-sm {
    flex: 1; min-width: 60px; background: var(--panel2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 8px; border-radius: 6px; font-family: 'Rajdhani', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all .15s;
    white-space: nowrap;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-sm.accent:hover { background: #ff8455; }
  .btn-sm.green { background: #06d6a020; border-color: var(--green); color: var(--green); }
  .btn-sm.red { background: #ef233c20; border-color: var(--red); color: var(--red); }

  /* Shape picker */
  .shape-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .shape-btn {
    aspect-ratio: 1; background: var(--panel2); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all .15s; color: var(--text2);
  }
  .shape-btn:hover { border-color: var(--accent); color: var(--accent); }
  .shape-btn.active { border-color: var(--accent); background: var(--accent)22; color: var(--accent); }

  /* Font controls */
  .font-select {
    width: 100%; background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 8px; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-size: 13px;
    outline: none; margin-bottom: 8px; cursor: pointer;
  }
  .font-select:focus { border-color: var(--accent); }

  /* Layers */
  #layers-list { display: flex; flex-direction: column; gap: 4px; }
  .layer-item {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-size: 13px; transition: all .15s;
  }
  .layer-item:hover { border-color: var(--text3); }
  .layer-item.active { border-color: var(--accent); background: var(--accent)15; }
  .layer-thumb { width: 28px; height: 28px; border-radius: 4px; background: var(--border); flex-shrink: 0; overflow: hidden; }
  .layer-thumb canvas { width: 100%; height: 100%; }
  .layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .layer-vis { color: var(--text3); font-size: 14px; cursor: pointer; }
  .layer-vis:hover { color: var(--text); }

  /* Filters */
  .filter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .filter-btn {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 4px; font-size: 11px; font-weight: 600; cursor: pointer; color: var(--text2);
    text-align: center; transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { border-color: var(--accent); background: var(--accent)22; color: var(--accent); }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .toggle-label { font-size: 12px; color: var(--text2); flex: 1; }
  .toggle {
    width: 36px; height: 20px; background: var(--border); border-radius: 10px; cursor: pointer;
    position: relative; transition: background .2s; flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: ''; position: absolute; width: 14px; height: 14px; background: #fff;
    border-radius: 50%; top: 3px; left: 3px; transition: left .2s;
  }
  .toggle.on::after { left: 19px; }

  /* Drag-drop overlay */
  #drop-overlay {
    position: absolute; inset: 0; background: rgba(255,107,53,.12);
    border: 3px dashed var(--accent); display: none; align-items: center; justify-content: center;
    z-index: 200; pointer-events: none; border-radius: 12px;
    font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 2px;
  }
  #drop-overlay.show { display: flex; }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
    z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; max-width: 400px; width: 100%; max-height: 90dvh; overflow-y: auto;
  }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--accent); }
  .modal label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; }
  .modal input[type=number], .modal input[type=text] {
    width: 100%; background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-size: 14px;
    outline: none; margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--accent); }

  /* Responsive: mobile panel collapses */
  @media (max-width: 640px) {
    #right-panel { width: 180px; min-width: 180px; }
    #toolbar { width: 44px; min-width: 44px; }
    --tool-size: 36px;
  }
  @media (max-width: 480px) {
    #right-panel { display: none; }
    #mobile-bottom { display: flex !important; }
  }

  /* Mobile bottom bar */
  #mobile-bottom {
    display: none; background: var(--panel); border-top: 1px solid var(--border);
    padding: 8px 12px; gap: 8px; overflow-x: auto; flex-shrink: 0;
  }
  #mobile-bottom::-webkit-scrollbar { display: none; }
  .mb-btn {
    flex-shrink: 0; background: var(--panel2); border: 1px solid var(--border); color: var(--text2);
    padding: 6px 12px; border-radius: 6px; font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px;
  }
  .mb-btn.active { border-color: var(--accent); color: var(--accent); }

  /* Histogram canvas */
  #histogram-canvas { width: 100%; height: 50px; border-radius: 4px; background: var(--panel2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-toggle { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
  .section-toggle::before { content: '▾'; color: var(--text3); font-size: 10px; transition: transform .2s; }
  .section-toggle.collapsed::before { transform: rotate(-90deg); }
  .section-body { overflow: hidden; }
  .section-body.hidden { display: none; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="brand">Akhand<span>Edit</span></div>
  <button class="top-btn" onclick="document.getElementById('file-input').click()">📂 Open</button>
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <button class="top-btn" onclick="newCanvas()">✨ New</button>
  <button class="top-btn" onclick="undo()">↩ Undo</button>
  <button class="top-btn" onclick="redo()">↪ Redo</button>
  <div class="spacer"></div>
  <div class="zoom-display" id="zoom-label">100%</div>
  <button class="top-btn" onclick="zoomIn()">＋</button>
  <button class="top-btn" onclick="zoomOut()">－</button>
  <button class="top-btn" onclick="fitToScreen()">⊡</button>
  <button class="top-btn primary" onclick="exportImage()">💾 Export</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT TOOLBAR -->
  <div id="toolbar">
    <button class="tool-btn active" id="tb-select" onclick="setTool('select')" title="Select / Move (V)"><span>↖</span></button>
    <button class="tool-btn" id="tb-crop" onclick="setTool('crop')" title="Crop (C)"><span>✂</span></button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tb-brush" onclick="setTool('brush')" title="Brush (B)"><span>🖌</span></button>
    <button class="tool-btn" id="tb-eraser" onclick="setTool('eraser')" title="Eraser (E)"><span>◻</span></button>
    <button class="tool-btn" id="tb-fill" onclick="setTool('fill')" title="Fill / Paint Bucket (G)"><span>🪣</span></button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tb-shape" onclick="setTool('shape')" title="Shapes (S)"><span>▭</span></button>
    <button class="tool-btn" id="tb-text" onclick="setTool('text')" title="Text (T)"><span>T</span></button>
    <button class="tool-btn" id="tb-line" onclick="setTool('line')" title="Line / Arrow (L)"><span>╱</span></button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tb-eyedropper" onclick="setTool('eyedropper')" title="Eyedropper (I)"><span>💉</span></button>
    <button class="tool-btn" id="tb-zoom-tool" onclick="setTool('zoom-tool')" title="Zoom (Z)"><span>🔍</span></button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="flipH()" title="Flip Horizontal"><span>⇔</span></button>
    <button class="tool-btn" onclick="flipV()" title="Flip Vertical"><span>⇕</span></button>
    <button class="tool-btn" onclick="rotateLeft()" title="Rotate Left 90°"><span>↺</span></button>
    <button class="tool-btn" onclick="rotateRight()" title="Rotate Right 90°"><span>↻</span></button>
  </div>

  <!-- CANVAS AREA -->
  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="main-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
    </div>
    <div id="drop-overlay">DROP IMAGE HERE</div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">

    <!-- ADJUSTMENTS -->
    <div class="panel-section">
      <div class="panel-title section-toggle" onclick="toggleSection(this)">Adjustments</div>
      <div class="section-body">
        <div class="slider-row"><span class="slider-label">Brightness</span><input type="range" id="sl-brightness" min="-150" max="150" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-brightness">0</span></div>
        <div class="slider-row"><span class="slider-label">Contrast</span><input type="range" id="sl-contrast" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-contrast">0</span></div>
        <div class="slider-row"><span class="slider-label">Saturation</span><input type="range" id="sl-saturation" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-saturation">0</span></div>
        <div class="slider-row"><span class="slider-label">Exposure</span><input type="range" id="sl-exposure" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-exposure">0</span></div>
        <div class="slider-row"><span class="slider-label">Highlights</span><input type="range" id="sl-highlights" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-highlights">0</span></div>
        <div class="slider-row"><span class="slider-label">Shadows</span><input type="range" id="sl-shadows" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-shadows">0</span></div>
        <div class="slider-row"><span class="slider-label">Whites</span><input type="range" id="sl-whites" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-whites">0</span></div>
        <div class="slider-row"><span class="slider-label">Blacks</span><input type="range" id="sl-blacks" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-blacks">0</span></div>
        <div class="slider-row"><span class="slider-label">Temperature</span><input type="range" id="sl-temperature" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-temperature">0</span></div>
        <div class="slider-row"><span class="slider-label">Tint</span><input type="range" id="sl-tint" min="-100" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-tint">0</span></div>
        <div class="slider-row"><span class="slider-label">Sharpness</span><input type="range" id="sl-sharpness" min="0" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-sharpness">0</span></div>
        <div class="slider-row"><span class="slider-label">Blur</span><input type="range" id="sl-blur" min="0" max="20" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-blur">0</span></div>
        <div class="slider-row"><span class="slider-label">Noise</span><input type="range" id="sl-noise" min="0" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-noise">0</span></div>
        <div class="slider-row"><span class="slider-label">Vignette</span><input type="range" id="sl-vignette" min="0" max="100" value="0" oninput="applyAdjustments()"><span class="slider-val" id="v-vignette">0</span></div>
        <div class="slider-row"><span class="slider-label">Opacity</span><input type="range" id="sl-opacity" min="0" max="100" value="100" oninput="applyAdjustments()"><span class="slider-val" id="v-opacity">100</span></div>
        <div class="btn-row" style="margin-top:6px">
          <button class="btn-sm" onclick="resetAdjustments()">Reset All</button>
          <button class="btn-sm accent" onclick="bakeAdjustments()">Apply</button>
        </div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="panel-section">
      <div class="panel-title section-toggle" onclick="toggleSection(this)">Filters</div>
      <div class="section-body">
        <div class="filter-grid" id="filter-grid"></div>
      </div>
    </div>

    <!-- BRUSH / TOOL OPTIONS -->
    <div class="panel-section">
      <div class="panel-title section-toggle" onclick="toggleSection(this)">Brush / Tool</div>
      <
